<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogada para Alvo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #00ffcc;
      margin-bottom: 20px;
    }
    input {
      padding: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      width: 100%;
      max-width: 400px;
    }
    .alvo {
      display: inline-block;
      background-color: #1e90ff;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 12px;
      font-size: 22px;
    }
    .destaque {
      background-color: #ffd700;
      color: #000;
      font-weight: bold;
    }
    #resultado {
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1>BOOT </h1>
  <input id="ultimos" placeholder="Ex: 22,18,3,10" oninput="processar()" />
  <div id="resultado"></div>

  <script>
    const jogadas = {
     
    0: [32,26,10,14,23,28,33,11,22,1,36,19,4],
    1: [0,2,33,20,10,28,19,21,13,34,23,32,16,14],
    2: [1,2,3,20,21,25,18,35,22,4,11,6,8,13,31,17],
    3: [2,4,35,26,23,30,21,12,6,9,33,25,0,14],
    4: [5,3,8,2,6,22,13,31,19,21,24,0,7,15,26,16,32],
    5: [6,4,10,15,24,25,23,32,14,27,16],
    6: [5,7,33,15,24,17,18,28,9,3,12,26,27,34,2,4,8,14,13],
    7: [6,8,25,16,34,21,28,29,27,17,14,4,18,12],
    8: [7,9,26,17,35,28,30,23,0,16,4,18,32,19,13,11,10,2,6],
    9: [8,10,33,6,3,22,31,27,36,18,19,29,12,17,14],
    10: [11,9,5,23,20,19,1,0,28,13,32,30,8,24],
    11: [10,12,29,30,20,36,35,2,33,22,31,0,8,13,16,13],
    12: [11,13,24,6,3,21,36,30,35,28,32,9,15],
    13: [12,14,36,27,31,22,4,33,26,19,10,11,8,1],
    14: [5,23,32,7,28,34,15,13,20,31,0,6],
    15: [14,16,24,33,6,35,32,19,30,10,12,4,0],
    16: [15,32,8,24,33,17,7,25,34,19,13,36,11],
    17: [7,27,20,8,26,35,25,34,16,18,9],
    18: [17,19,36,27,9,29,22,8,28,21,2],
    19: [18,20,16,15,4,9,10,1,28,29,13,0],
    20: [21,19,2,35,11,29,1,14,10,0,17,27],
    21: [2,4,1,12,3,36,30,20,22,23,25,27,18,29],
    22: [2,9,18,20,24,26,31,13,21,23,4,29,33,11,25],
    23: [32,10,8,14,5,24,22,3,26,0,21,25,27],
    24: [23,25,5,16,33,15,6,26,22,20,4,12,30],
    25: [5,26,24,16,7,34,17,2,21,27,23,22],
    26: [3,0,13,6,8,17,35,20,24,22,27,25,29,31,23],
    27: [13,6,28,26,9,36,18,7,17,25,23,21,30,20],
    28: [10,1,19,0,14,7,12,18,8,27,29,31],
    29: [11,30,2,20,35,7,18,19,9,28,10,26,21],
    30: [31,29,11,8,3,36,21,12,15,32,34,0,23,24,10,27],
    31: [30,32,13,14,9,11,33,26,35,22,4,28,34],
    32: [23,12,0,15,30,34,36,8,16,5,14,31,33],
    33: [32,16,0,22,11,1,13,35,31,6,9,24,15,3,34,36],
    34: [33,35,36,32,14,16,7,25,6,17,30,31],
    35: [34,36,33,15,12,3,31,20,2,11,8,26,17],
    36: [35,0,11,13,16,3,30,32,34,9,27,18,21,12,33]

    };

    function processar() {
      const input = document.getElementById('ultimos').value.trim();
      const numeros = input
  .split(',')
  .map(n => parseInt(n.trim()))
  .filter(n => !isNaN(n) && n >= 0 && n <= 36)
  .slice(-12); 
      if (numeros.length === 0) {
        document.getElementById('resultado').innerHTML = '';
        return;
      }

      const contagem = {};
      for (const n of numeros) {
        const vizinhos = jogadas[n] || [];
        for (const v of vizinhos) contagem[v] = (contagem[v] || 0) + 1;
      }

      const ordenados = Object.entries(contagem).sort((a, b) => b[1] - a[1]);
      const alvosFortes = ordenados.slice(0, 3).map(a => parseInt(a[0]));
      const melhorAlvo = alvosFortes[0];

      document.getElementById('resultado').innerHTML = `
        <strong>Alvos mais fortes:</strong><br>
        ${alvosFortes.map(alvo => `
          <span class="alvo${alvo === melhorAlvo ? ' destaque' : ''}">${alvo}</span>
        `).join('')}
      `;
    }
  </script>
</body>
</html>
