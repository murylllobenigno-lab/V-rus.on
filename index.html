<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.BOOT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="bg-black text-white font-sans">
<div id="app"></div>

<script>
// 🎰 APIs
const roletaAPIs = {
  immersive: "https://api.casinoscores.com/svc-evolution-game-events/api/immersiveroulette?page=0&size=200&sort=data.settledAt,desc&duration=6",
  "auto roulette": "https://api.casinoscores.com/svc-evolution-game-events/api/autoroulette?page=0&size=200&sort=data.settledAt,desc&duration=6"
};

let numerosData = [];
let jogadasAlvo = {};
let analises = {};
let recolhido = false;
let roletaAtual = "immersive";

const app = document.getElementById('app');

// =========================
// FUNÇÕES
// =========================
function createElement(tag, className = '', content = '') {
  const el = document.createElement(tag);
  if(className) el.className = className;
  if(content) el.innerHTML = content;
  return el;
}

function pegarUltimos5Operacoes(){
  return numerosData.slice(0,5);
}

function criarGrade(numeros) {
  return numeros.map(n => `
    <div class="numero w-7 h-7 text-xs flex items-center justify-center rounded text-white font-semibold border"
      data-number="${n}">
      ${n}
    </div>
  `).join('');
}

function aplicarCores(tipo) {
  const ativos = analises[tipo] || [];
  document.querySelectorAll('.numero').forEach(el => {
    const n = parseInt(el.dataset.number);
    el.className = `numero w-7 h-7 text-xs flex items-center justify-center rounded text-white font-semibold border ${
      ativos.includes(n) ? 'bg-red-800' : 'bg-blue-900'
    }`;
  });
}

function atualizarGrade() {
  const grid = document.getElementById('grid');
  if(!grid) return;

  const dados = recolhido ? numerosData.slice(0,12) : numerosData;
  grid.innerHTML = criarGrade(dados);

  const select = document.getElementById('analiseSelect');
  if(select) aplicarCores(select.value);
}

async function carregarNumerosAPI(nome) {
  try {
    const r = await fetch(roletaAPIs[nome] + "&_=" + Date.now(), {cache:"no-store"});
    const data = await r.json();

    const numeros = data.map(r => r?.data?.result?.outcome?.number).filter(n => n !== undefined);

    if(numeros.length){
      numerosData = numeros.slice(0, 20);
      atualizarGrade();
      processarAlvo();
    }
  } catch(e){
    console.error("Erro API:", e);
  }
}

// =========================
// ABAS
// =========================
const abaInicio = createElement('section','p-4', `
<div class="text-center text-gray-400">Sistema pronto 🚀</div>
`);

const abaOperacoes = createElement('section','p-4 hidden', `
<div class="flex justify-between mb-3">
  <select id="analiseSelect" class="bg-gray-800 px-2 py-1 rounded"></select>
  <button id="recolherBtn" class="bg-yellow-600 px-3 rounded">↑</button>
</div>

<div id="grid" class="grid grid-cols-9 gap-1"></div>

<select id="roletaSelectBottom" class="w-full mt-3 bg-gray-800 px-2 py-2 rounded">
  <option value="immersive">Immersive</option>
  <option value="auto roulette">Auto Roulette</option>
</select>
`);
const abaMuryllo = createElement('section','flex flex-col h-screen bg-black', `

<!-- 🎯 ALVOS EM LINHA -->
<div class="flex justify-center items-center gap-3 p-3 bg-black border-b border-gray-800">

  <div id="alvoPrincipal"
    class="bg-yellow-400 text-black font-bold text-xl px-4 py-2 rounded-lg">
    36
  </div>

  <div id="alvoSec1"
    class="bg-blue-600 text-white px-3 py-2 rounded-lg">
    11
  </div>

  <div id="alvoSec2"
    class="bg-blue-600 text-white px-3 py-2 rounded-lg">
    19
  </div>

</div>

<!-- 🎰 IFRAME FULL -->
<div class="flex-1">
  <iframe 
    id="iframePrincipal"
    class="w-full h-[78vh]"
    src="https://7games.bet.br/pb/casino/slots/28/21031/immersive-roulette-evolution">
  </iframe>
</div>

`);



// =========================
// NAV
// =========================
const nav = createElement('nav','fixed bottom-0 left-0 right-0 bg-gray-900 flex justify-around py-3');

const btnInicio = createElement('button','', 'Inicio');
const btnOp = createElement('button','', 'Operações');
const btnMur = createElement('button','', 'Muryllo');

nav.append(btnInicio,btnOp,btnMur);

// =========================
// CONTROLE ABAS
// =========================
function atualizarAbas(aba){
  abaInicio.classList.add('hidden');
  abaOperacoes.classList.add('hidden');
  abaMuryllo.classList.add('hidden');

  if(aba==='inicio') abaInicio.classList.remove('hidden');
  if(aba==='op') abaOperacoes.classList.remove('hidden');
  if(aba==='mur') abaMuryllo.classList.remove('hidden');
}

btnInicio.onclick=()=>atualizarAbas('inicio');
btnOp.onclick=()=>atualizarAbas('op');
btnMur.onclick=()=>atualizarAbas('mur');

// =========================
// EVENTOS
// =========================
document.addEventListener('click', e=>{
  if(e.target.id==='recolherBtn'){
    recolhido=!recolhido;
    atualizarGrade();
  }
});

document.addEventListener('change', e=>{
  if(e.target.id==='analiseSelect'){
    aplicarCores(e.target.value);
  }

  if(e.target.id==='roletaSelectBottom'){
    roletaAtual = e.target.value;
    carregarNumerosAPI(roletaAtual);
  }
});

// =========================
// ALVO
// =========================
function processarAlvo(){
  const nums = pegarUltimos5Operacoes();
  let cont = {};

  nums.forEach(n=>{
    (jogadasAlvo[n]||[]).forEach(v=>{
      cont[v]=(cont[v]||0)+1;
    });
  });

  const top = Object.entries(cont).sort((a,b)=>b[1]-a[1]).slice(0,3);

  document.getElementById("alvoPrincipal").textContent = top[0]?.[0] || "---";
  document.getElementById("alvoSec1").textContent = top[1]?.[0] || "---";
  document.getElementById("alvoSec2").textContent = top[2]?.[0] || "---";
}

// =========================
// ANALISES
// =========================
function preencherAnalises(){
  const select = document.getElementById('analiseSelect');
  if(!select) return;

  select.innerHTML='';

  Object.keys(analises).forEach(k=>{
    const op=document.createElement('option');
    op.value=k;
    op.textContent=k;
    select.appendChild(op);
  });
}

// =========================
// FETCH DADOS
// =========================
fetch('https://murylllobenigno-lab.github.io/Googlefiles/dados.json')
.then(r=>r.json())
.then(d=>{
  numerosData=d.numerosData||[];
  analises=d.analises||{};
  jogadasAlvo=d.jogadasAlvo||{};

  atualizarGrade();
  preencherAnalises();
});

// =========================
// APP
// =========================
app.append(abaInicio,abaOperacoes,abaMuryllo,nav);

// iniciar
atualizarAbas('inicio');
carregarNumerosAPI(roletaAtual);

// auto update
setInterval(()=>{
  carregarNumerosAPI(roletaAtual);
},15000);

</script>
</body>
</html>
